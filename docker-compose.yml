services:
  mysql:
    image: mysql:8.4
    # --skip-log-bin: バイナリログを無効化。
    # 大量INSERT時にbinlogがディスクを食い尽くして
    # "binlog_error_action=ABORT_SERVER" でMySQLが落ちるのを防ぐ。
    # レプリケーション不要なdev/prod環境では常に無効でよい。
    command: --skip-log-bin
    environment:
      MYSQL_ROOT_PASSWORD: rootpass
      MYSQL_DATABASE: logdb
      MYSQL_USER: loguser
      MYSQL_PASSWORD: logpass
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-prootpass"]
      interval: 5s
      timeout: 5s
      retries: 20

  backend:
    build: ./backend
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      DATABASE_URL: mysql://loguser:logpass@mysql:3306/logdb
      UPLOAD_DIR: /uploads
      TABLE_SUFFIX: _la
      HOST: 0.0.0.0
      PORT: 8080
    ports:
      - "8080:8080"
    volumes:
      - uploads:/uploads

  frontend:
    build: ./frontend
    ports:
      - "5173:80"
    depends_on:
      - backend

  phpmyadmin:
    image: phpmyadmin:latest
    environment:
      PMA_HOST: mysql
      PMA_USER: root
      PMA_PASSWORD: rootpass
    ports:
      - "8081:80"
    depends_on:
      mysql:
        condition: service_healthy

volumes:
  mysql_data:
  uploads:
